<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width,initial-scale=1" />
      <title>List of Players</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet" href="https://pyscript.net/releases/2025.8.1/core.css" />
      <script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>
      <!-- this is the confetti library -->
      <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
      <style>

          body
          {
              background-image: url(https://i.pinimg.com/1200x/f3/80/f5/f380f521285ca769cb547756e7577fa8.jpg);
              background-size: cover;
              background-repeat: no-repeat;
          }

          .navbar
          {
              display: flex;
              align-items: center;
              justify-content: baseline;
              background-color: #f0e9d5;
              padding: 0px 0px;
          }

          .navbar .logo
          {
              display: flex;
              align-items: center;
          }

          .navbar .logo img
          {
              height: 60px;
              margin-right: 10px;
          }

          .navbar .nav-links
          {
            display: flex;
            gap: 20px;
          }

          .navbar .nav-links a
          {
            text-decoration: none;
            color: #5e0704;
            font-size: 25px;
            font-weight: bolder;
            font-family: 'Gill Sans',  sans-serif;
            margin-right: 30px;
            text-align: center;
          }

          .navbar .nav-links a:hover
          {
            text-decoration: underline;
          }

          .players-container {
             display: flex;
             justify-content: center;
             align-items: center;
             margin-top: 40px;
          }
        
          .players-card {
             width: 950px;
             background: #f0e9d5;
             border-radius: 70px;
             padding: 40px;
             box-shadow: 0px 10px 60px rgba(0,0,0,0.2);
             text-align: center;
          }

          .players-card h2 {
             font-weight: bold;
             margin-bottom: 20px;
             font-family: 'Gill Sans',  sans-serif;
             color: #5e0704;
             font-size: 60px;
             text-align: center;
          }

          .gradient-btn {
             background: #5e0704;
             border: none;
             color: #f0e9d5;
             padding: 8px 20px;
             border-radius: 25px;
             font-weight: bold;
             margin-bottom: 15px;
             cursor: pointer;
             text-align: center;
          }

          #players-list {
             text-align: center;
             margin-top: 10px;
             font-family: 'Gill Sans',sans-serif;
             color: #a64451;
             font-size: 25px;
             font-weight: bold;
          }

      </style>
      </head>
      <body>

<div class="navbar">
<div class="logo">
<img style="width: 80px; height: 80px; margin-left: 10px;"
src="schoollogo.png" alt="Logo" >
<h1 style="font-size: 25px; font-family: 'Gill Sans',  sans-serif;
  text-align: center; margin-top: 10px; font-weight: bolder;
  color: #5e0704; margin-left: 0px;">OBMC INTRAMS</h1>
</div>

<div class="nav-links">

<a href="index.html">List of players</a>
<a href="page1.html">Sign Up</a>
</div>

</div>

<br><br>

<div class="players-container">
  <div class="players-card">
      <h2>Intramurals Players:</h2>
      <ol id="players-list"></ol>
      <button class="gradient-btn" py-click="show_players">
          Click here
      </button>    
  </div>
</div>

<script type="py" src="main.py"></script>

<br><br>

</body>
</html>
